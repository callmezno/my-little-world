<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCS-236 | Home</title>
    <style>
        :root {
             --bg-color: #f8f4ff;
            --text-color: #5e548e;
            --primary-color: #be95c4;
            --secondary-color: #e0b1cb;
            --nav-bg: #ffffff;
            --border-color: #9f86c0;
        }
        body {
            margin: 0; 
            padding: 0;
            background: linear-gradient(135deg, #fff9f2 0%, #ffe5ec 100%);
            min-height: 100vh; 
            background-attachment: fixed;
            font-family: "Quicksand", 'Comfortaa', cursive, sans-serif;
            color: var(--text-color); 
            line-height: 1.6; 
            overflow-x: hidden;
        }
        header {
            background-color: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(10px);
            padding: 0.8rem 2rem; 
            display: flex; 
            justify-content: space-between;
            align-items: center; 
            position: fixed; 
            top: 0; 
            width: 100%;
            z-index: 1000; 
            box-sizing: border-box; 
            border-bottom: 3px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(255, 175, 204, 0.2);
            transition: all 0.3s ease;
        }
        .logo { 
             font-size: 1.8rem; 
            font-weight: 900; 
            color: var(--primary-color); 
            font-family: 'Comfortaa', 'Segoe UI', cursive, sans-serif;
            text-shadow: 2px 2px 0px #ffffff;
            text-decoration: none; 
            display: inline-block;
        }
        .logo:hover { 
            color: #ff8fab; 
        }
        nav a { 
            position: relative;
            color: var(--text-color); 
            text-decoration: none; 
            margin-left: 1.5rem; 
            padding: 5px 10px;
            font-weight: bold;
            transition: 0.3s; 
        }
        nav a::before { 
            content: '🎀';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
        }
        nav a:hover:before { 
            transform: translateX(-50%) scale(1.2);
            opacity: 1; 
        }
        nav a:hover { 
            color: var(--primary-color);
            transform: translateY(3px);
        }
        section { 
            padding: 100px 2rem; 
            min-height: 80vh;
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }
        h1 { 
            font-size: 3.5rem; 
            font-family: 'Comfortaa', cursive;
            margin-bottom: 1rem;
            background: linear-gradient(
                45deg, 
                var(--primary-color), 
                var(--secondary-color)); 
                -webkit-background-clip: text; 
                background-clip: text;
                -webkit-text-fill-color: transparent; 
                filter: drop-shadow(2px 2px 0px white);
        }
        .logo { 
            font-size: 1.8rem; 
            font-weight: 900; 
            color: var(--primary-color); 
            text-decoration: none; 
        }
        form { 
            display: flex; 
            flex-direction: column; 
            gap: 1rem; 
            max-width: 500px; 
            margin: 0 auto; 
            text-align: left; 
        }
        input, textarea { 
            padding: 1rem; 
            border-radius: 15px; 
            border: 2px solid var(--border-color); 
            background-color: white;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }
        input:focus, textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(255, 175, 204, 0.3);
        }
        button { 
            background: var(--primary-color);
            color: white;
            padding: 1rem;
            font-size: 1.1rem; 
            font-weight: bold;
            border-radius: 20px;
            border: none; 
            cursor: pointer; 
            box-shadow: 0 4px 0px #ff8fab;
            transition: 0.2s;
            margin-top: 1rem;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0px #ff8fab;
        }
        button:hover {
            background-color: #ffc2d1;
            filter: brightness(1.05);
        }
    </style>
</head>
<body>
    <header>
        <a href="Index.html" class="logo"> Hello!😼</a>
        <nav>
            <a href="Index.html">Home</a>
            <a href="About.html">About</a>
            <a href="Thought.html">Thoughts</a>
            <a href="Contact.html">Contact</a>
        </nav>
    </header>
    <section>
        <h1>Let's Talk</h1>
        <form>
            <input type="text" placeholder="Name">
            <textarea rows="4" placeholder="Message"></textarea>
            <button type="submit">Send</button>
        </form>
    </section>
</body>
</html>
